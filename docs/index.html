<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GeoGuessr Hint Globe</title>
<meta name="description" content="Interactive globe of GeoGuessr country metas — filter clues by source and specificity, jump to GeoGuessr to practice.">
<link rel="stylesheet" href="style.css">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%235bd6c0'/%3E%3Cpath d='M2 16h28M16 2a20 20 0 0 1 0 28M16 2a20 20 0 0 0 0 28' stroke='%23070b14' fill='none' stroke-width='1.4'/%3E%3C/svg%3E">
</head>
<body>
<div id="globe"></div>

<div class="topbar">
  <div class="brand">Geo<em>Hint</em> Globe</div>
  <div class="prog" id="prog">loading…</div>
</div>

<aside class="sidebar">
  <div class="search"><input id="search" type="text" placeholder="Search country…" autocomplete="off"></div>
  <div class="list" id="list"></div>
</aside>

<div class="legend" id="legend">
  <span><i style="background:#5bd6c0"></i>Country</span>
  <span><i style="background:#6aa9ff"></i>Region</span>
  <span><i style="background:#c78bff"></i>State</span>
  <span><i style="background:#ff9e6a"></i>City</span>
  <span><i style="background:#ff6b8b"></i>Special</span>
</div>

<section class="panel" id="panel">
  <div class="x" id="close">&times;</div>
  <div class="head">
    <h2 id="p-name"></h2>
    <div class="sub" id="p-sub"></div>
    <div class="links" id="p-links"></div>
  </div>
  <div class="filters" id="p-filters"></div>
  <div class="hints" id="p-hints"></div>
</section>

<script src="globe.gl.js"></script>
<script src="app.js"></script>
</body>
</html>
